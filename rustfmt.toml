edition = "2021"

# The codebase has consciously evolved a denser style than stock
# rustfmt for two specific shapes: bare-expression let-else on one
# line (`let Some(x) = .. else { return };`) and 100-110 col
# warn!/format! strings that don't easily wrap without losing
# readability. This config captures those choices minimally
# without over-fitting to every other dense layout.

# Bump the ceiling slightly so warn! / format! strings around
# 100-108 cols don't churn. Stock 100 was hitting the codebase
# routinely.
max_width = 110

# Allow the bare-expression let-else shape — `let Some(x) = .. else
# { return };` — to stay on one line up to the max_width budget.
# rustfmt's `single_line_let_else_max_width` only collapses
# *expression* bodies, so the statement-with-semi form (`else
# { return; };`) is always expanded to a 3-line block regardless of
# this setting. The codebase has both; this knob preserves the
# bare-expression form (the form most one-line let-else sites
# already used) and tolerates the expansion of the rest.
#
# rustfmt emits an informational warning when this value equals
# max_width; the clamp behaviour matches our intent — accept
# the noise.
single_line_let_else_max_width = 110
