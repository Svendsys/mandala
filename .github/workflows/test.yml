# Runs ./test.sh on every main push and every pull request. The
# script itself owns the test logic (native cargo test + workspace-
# wide wasm32 cargo check); this workflow is a transport for invoking
# it so the dual-target discipline in CODE_CONVENTIONS.md §2 is
# enforced remotely, not just aspirationally locally.
#
# `push: branches: [main]` (rather than bare `push:`) prevents the
# duplicate-run flake: without the constraint, a push to a PR branch
# fires both `push` and `pull_request` events, spawning two identical
# `test` runs at the same SHA that race for runner / cache resources.
# Mirrors `license-headers.yml`'s trigger shape.

name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Run ./test.sh
        run: ./test.sh
